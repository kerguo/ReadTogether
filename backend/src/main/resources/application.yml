server:
  port: ${PORT:8080}

spring:
  application:
    name: readtogether-backend
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: ${DB_URL:jdbc:sqlite:./data/readtogether.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

app:
  jwt:
    secret: ${JWT_SECRET:readtogether-local-dev-secret-change-before-production-32}
    expiration: ${JWT_EXPIRATION_SECONDS:86400}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:admin@readtogether.com}
  wechat:
    mock-scan-base-url: ${WECHAT_MOCK_SCAN_BASE_URL:http://localhost:8080}
