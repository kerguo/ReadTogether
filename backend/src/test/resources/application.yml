spring:
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:3MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:3MB}
  datasource:
    url: jdbc:sqlite:file:readtogether-test?mode=memory&cache=shared
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

app:
  jwt:
    secret: test-secret-readtogether-32-characters-minimum
    expiration: 3600
  cors:
    allowed-origins: http://localhost:3000
  mail:
    enabled: false
  voice:
    enabled: false
    livekit:
      url:
      api-key:
      api-secret:
